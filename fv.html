<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaving Frost Valley Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

```
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        text-align: center;
        width: 100%;
        max-width: 800px;
    }

    h1 {
        font-size: clamp(1.8rem, 6vw, 3.5rem);
        font-weight: 300;
        margin-bottom: 10px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
        font-size: clamp(1rem, 3vw, 1.5rem);
        opacity: 0.9;
        margin-bottom: 40px;
        font-weight: 400;
    }

    .countdown {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        margin: 40px 0;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }

    .time-unit {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }

    .time-unit:hover {
        transform: translateY(-5px);
    }

    .number {
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: 700;
        line-height: 1;
        margin-bottom: 8px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .label {
        font-size: clamp(0.8rem, 2.5vw, 1.1rem);
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.9;
        font-weight: 500;
    }

    .date-info {
        margin-top: 30px;
        font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        opacity: 0.8;
        font-weight: 300;
    }

    .finished {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        margin: 40px 0;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    /* Landscape orientation adjustments */
    @media (orientation: landscape) and (max-height: 500px) {
        body {
            padding: 10px;
            justify-content: flex-start;
            padding-top: 20px;
        }
        
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            margin-bottom: 20px;
        }
        
        .countdown {
            margin: 20px 0;
            gap: 15px;
        }
        
        .time-unit {
            padding: 15px 10px;
        }
        
        .number {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            margin-bottom: 5px;
        }
        
        .label {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }
        
        .date-info {
            margin-top: 15px;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }
    }

    /* iPhone SE and small devices */
    @media (max-width: 375px) {
        .countdown {
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .time-unit {
            padding: 20px 10px;
        }
    }

    /* iPad and larger tablets */
    @media (min-width: 768px) {
        .countdown {
            grid-template-columns: repeat(4, 1fr);
            max-width: 700px;
        }
    }
</style>

<body>
    <div class="container">
        <h1>Leaving Frost Valley!</h1>
        <p class="subtitle">September 19, 2025 at 12:00 PM</p>

```
    <div id="countdown" class="countdown">
        <div class="time-unit">
            <div id="days" class="number">00</div>
            <div class="label">Days</div>
        </div>
        <div class="time-unit">
            <div id="hours" class="number">00</div>
            <div class="label">Hours</div>
        </div>
        <div class="time-unit">
            <div id="minutes" class="number">00</div>
            <div class="label">Minutes</div>
        </div>
        <div class="time-unit">
            <div id="seconds" class="number">00</div>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div id="finished" class="finished" style="display: none;">
        🎉 Time to Leave! 🎉
    </div>
    
    <p class="date-info">Powered by Thssysnet</p>
</div>

<script>
    function updateCountdown() {
        // Target date: September 19, 2025 at 12:00 PM (device local time)
        const targetDate = new Date('2025-09-19T12:00:00').getTime();
        const now = new Date().getTime();
        const difference = targetDate - now;

        if (difference > 0) {
            // Calculate time units
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Update display with zero padding
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        } else {
            // Countdown finished
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('finished').style.display = 'block';
        }
    }

    // Update countdown immediately and then every second
    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

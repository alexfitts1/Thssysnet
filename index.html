<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thssysnet</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red:   #B22234;
      --white: #FFFFFF;
      --blue:  #3C3B6E;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Instrument Serif', Georgia, serif;
      background: linear-gradient(
        to bottom,
        var(--red)   0%,
        #c94a5a      18%,
        #e08090      32%,
        var(--white) 50%,
        #a0a8d8      66%,
        #6a70b8      80%,
        var(--blue)  100%
      );
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtle noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Stars / sparkle texture top + bottom */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 80px 80px, 130px 130px;
      background-position: 0 0, 40px 40px;
      pointer-events: none;
      opacity: 0.18;
      z-index: 0;
    }

    /* ── Lock bar (mirrors .gov lock) ── */
    .lockbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 7px 20px;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.22);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.75);
      z-index: 10;
      animation: fadeDown 1.2s ease both;
    }
    .lockbar svg { flex-shrink: 0; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 34px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 48px;
      z-index: 10;
      animation: fadeDown 1.3s ease both;
    }
    .nav-logo {
      font-size: 17px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      font-style: italic;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: rgba(255,255,255,1); }

    /* ── Main content ── */
    main {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      gap: 0;
    }

    .emblem {
      width: 110px;
      height: 110px;
      margin-bottom: 32px;
      opacity: 0;
      animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      filter: drop-shadow(0 0 28px rgba(255,255,255,0.35));
    }

    .tagline {
      font-size: clamp(13px, 2vw, 15px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 18px;
      opacity: 0;
      animation: riseIn 1.2s ease 0.55s forwards;
    }

    h1 {
      font-size: clamp(52px, 9vw, 108px);
      font-weight: 400;
      font-style: italic;
      line-height: 0.96;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow:
        0 2px 60px rgba(0,0,0,0.18),
        0 0 120px rgba(255,255,255,0.12);
      opacity: 0;
      animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
      margin-bottom: 30px;
    }

    .motto {
      font-size: clamp(16px, 2.4vw, 22px);
      font-style: italic;
      color: rgba(255,255,255,0.82);
      max-width: 560px;
      line-height: 1.55;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: riseIn 1.2s ease 1.1s forwards;
      margin-bottom: 52px;
    }

    .cta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: riseIn 1.2s ease 1.5s forwards;
    }

    .btn {
      font-family: 'Instrument Serif', serif;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: rgba(255,255,255,0.95);
      color: var(--blue);
    }
    .btn-primary:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.4);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.7);
      transform: translateY(-2px);
    }

    /* ── Divider rule ── */
    .rule {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.4);
      margin: 0 auto 26px;
      opacity: 0;
      animation: riseIn 1s ease 0.4s forwards;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 48px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      z-index: 10;
      animation: fadeUp 1.2s ease 1.8s both;
    }
    footer a {
      color: inherit;
      text-decoration: none;
    }
    footer a:hover { color: rgba(255,255,255,0.8); }

    /* ── Keyframes ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 0.45; transform: translateY(0); }
    }

    /* Pulse glow on emblem */
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 28px rgba(255,255,255,0.35)); }
      50%       { filter: drop-shadow(0 0 52px rgba(255,255,255,0.65)); }
    }
    .emblem { animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards, glowPulse 4s ease-in-out 2s infinite; }

    @media (max-width: 600px) {
      nav { padding: 12px 20px; }
      .nav-links { display: none; }
      footer { padding: 12px 20px; }
      footer .footer-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- Lock bar -->
  <div class="lockbar">
    <svg width="12" height="14" viewBox="0 0 12 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="6" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M3.5 6V4a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    Secure &nbsp;·&nbsp; thssysnet.pw &nbsp;·&nbsp; Official Network
  </div>

  <!-- Nav -->
  <nav>
    <span class="nav-logo">Thssysnet</span>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Network</a></li>
      <li><a href="#">Connect</a></li>
    </ul>
  </nav>

  <!-- Main hero -->
  <main>
    <!-- SVG Emblem: stylised torch / signal tower -->
    <svg class="emblem" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring -->
      <circle cx="55" cy="55" r="50" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <!-- Signal arcs -->
      <path d="M28 55 A27 27 0 0 1 82 55" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <path d="M20 55 A35 35 0 0 1 90 55" stroke="rgba(255,255,255,0.2)"  stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M12 55 A43 43 0 0 1 98 55" stroke="rgba(255,255,255,0.12)" stroke-width="1"   fill="none" stroke-linecap="round"/>
      <!-- Tower mast -->
      <line x1="55" y1="55" x2="55" y2="85" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="45" y1="85" x2="65" y2="85" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Flame / signal dot -->
      <circle cx="55" cy="46" r="5.5" fill="white" opacity="0.9"/>
      <circle cx="55" cy="46" r="9" fill="white" opacity="0.1"/>
      <!-- Braces -->
      <line x1="55" y1="72" x2="44" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <line x1="55" y1="72" x2="66" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </svg>

    <div class="tagline">thssysnet.pw</div>
    <div class="rule"></div>

    <h1>Thssysnet</h1>

    <p class="motto">
      <!--The network is the message.<br>
      Something is always transmitting. -->
    </p>

    <div class="cta-row">
      <a href="#" class="btn btn-primary">Clock</a>
      <a href="#" class="btn btn-ghost">Learn More</a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <span>© 2026 Thssysnet</span>
    <span class="footer-right"><a href="#">Privacy</a> &nbsp;&nbsp; <a href="#">Terms</a> &nbsp;&nbsp; <a href="#">Contact</a></span>
  </footer>

</body>
</html>
